<div *ngIf="accounts">
  <div class="title">{{ label | translate }}</div>
  <mat-card-content>
    <div class="consent-box accounts" [formGroup]="form">
      <mat-radio-group class="accounts example-radio-group" formControlName="selectedAccount">
        <label class="account-row" *ngFor="let account of accounts">
          <div class="account-info">
            <div class="account Aligner">
              <div>
                <div>{{ account.account?.nickname }}</div>
                <div class="secondary-text account-number" *ngIf="account.account?.accounts">
                  {{ (account.account?.accounts)[0] | AccountNumberFormat }}
                </div>
                <div *ngIf="account.balances">
                  <div class="balance" *ngFor="let balance of account.balances">{{ balance | BalanceFormat }}</div>
                </div>
              </div>

              <span class="spacer"></span>
              <div class="Aligner">
                <mat-radio-button class="Aligner-item" [value]="account.account"></mat-radio-button>
              </div>
            </div>
          </div>
        </label>
      </mat-radio-group>
    </div>
  </mat-card-content>
</div>
